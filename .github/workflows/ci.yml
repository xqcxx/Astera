name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ---- Security Audit ----
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit binary
        id: cache-cargo-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}-0.22.1

      - name: Install cargo-audit
        if: steps.cache-cargo-audit.outputs.cache-hit != 'true'
        run: cargo install cargo-audit --version 0.22.1 --locked

      - name: Run cargo-audit
        working-directory: ./contracts
        run: cargo audit -f ../Cargo.lock

      - name: Setup Node.js for npm audit
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Run npm audit
        working-directory: ./frontend
        run: npm audit --audit-level=high

  # ---- Rust Contracts ----
  rust-contracts:
    name: Rust Contracts
    runs-on: ubuntu-latest
    needs: security-audit
    strategy:
      matrix:
        contract: [invoice, pool, credit_score]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Check formatting
        working-directory: ./contracts/${{ matrix.contract }}
        run: cargo fmt -- --check

      - name: Run clippy
        working-directory: ./contracts/${{ matrix.contract }}
        run: cargo clippy -- -D warnings

      - name: Build contract
        working-directory: ./contracts/${{ matrix.contract }}
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Run tests
        working-directory: ./contracts/${{ matrix.contract }}
        run: cargo test --verbose

      - name: Run fuzz tests
        working-directory: ./contracts/${{ matrix.contract }}
        run: cargo test --test fuzz_tests --verbose
        continue-on-error: false

  # ---- WASM Size Check ----
  check-wasm-size:
    name: Check Wasm binary sizes
    runs-on: ubuntu-latest
    needs: rust-contracts
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Build contracts
        run: cargo build --target wasm32-unknown-unknown --release
      - name: Check sizes
        run: |
          MAX_SIZE_BYTES=204800
          for wasm in target/wasm32-unknown-unknown/release/*.wasm; do
            SIZE=$(stat -c%s "$wasm")
            echo "$wasm: $SIZE bytes"
            if [ "$SIZE" -gt "$MAX_SIZE_BYTES" ]; then
              echo "ERROR: $wasm exceeds limit"
              exit 1
            fi
          done

  # ---- Frontend ----
  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        env:
          # Some runners/environments set `omit=optional`, which prevents
          # platform bindings (e.g. @parcel/watcher-linux-x64-glibc) from being
          # installed and can break Next builds while loading config.
          NPM_CONFIG_OMIT: ""
          npm_config_optional: "true"
        run: |
          npm ci --include=optional
          echo "npm omit=$(npm config get omit || true)"
          echo "node=$(node -v) npm=$(npm -v)"

          # Ensure Next's native SWC binding is present on Linux.
          NEXT_VERSION=$(node -p "require('./node_modules/next/package.json').version")
          echo "next=${NEXT_VERSION}"
          if node -e "require('@next/swc-linux-x64-gnu'); console.log('next swc ok')"; then
            echo "next swc ok"
          else
            npm i --no-save "@next/swc-linux-x64-gnu@${NEXT_VERSION}"
            node -e "require('@next/swc-linux-x64-gnu'); console.log('next swc ok after fallback')"
          fi
          # Some CI runners end up with a partially-installed SWC native package.
          # Rebuild to ensure the binary is present and loadable.
          npm rebuild @next/swc-linux-x64-gnu --foreground-scripts || true
          node -e "require('@next/swc-linux-x64-gnu'); console.log('next swc ok after rebuild')"

          # Ensure Parcel watcher native binding is present (some tooling relies on it).
          if node -e "require('@parcel/watcher'); console.log('parcel watcher ok')"; then
            echo "parcel watcher ok"
          else
            npm i --no-save @parcel/watcher-linux-x64-glibc@2.5.6
            node -e "require('@parcel/watcher'); console.log('parcel watcher ok after fallback')"
          fi
          npm rebuild @parcel/watcher --foreground-scripts || true
          node -e "require('@parcel/watcher'); console.log('parcel watcher ok after rebuild')"

      - name: Run ESLint
        run: npm run lint

      - name: Native binding diagnostics
        run: |
          node -e "const mods=['@next/swc-linux-x64-gnu','@parcel/watcher','lightningcss','sharp']; for (const m of mods){ try{ require(m); console.log('ok:',m);}catch(e){ console.log('fail:',m); console.error(e && e.stack ? e.stack : e); } }"
          node -e "import('./next.config.mjs').then(()=>console.log('ok: next.config import')).catch((e)=>{console.log('fail: next.config import'); console.error(e && e.stack ? e.stack : e); process.exit(0);})"

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Upload Sentry source maps
        if: github.ref == 'refs/heads/main' && env.SENTRY_AUTH_TOKEN != ''
        run: npx @sentry/nextjs upload-sourcemaps .next --auth-token ${{ secrets.SENTRY_AUTH_TOKEN }} --org ${{ secrets.SENTRY_ORG }} --project ${{ secrets.SENTRY_PROJECT }} || true
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

  # ---- Dependency Scanning ----
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Scan frontend dependencies
        working-directory: ./frontend
        run: |
          npm install -g npm-audit-resolver
          npm audit --audit-level=high

  # ---- E2E Tests (Playwright) ----
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [frontend]
    if: github.event_name == 'pull_request'
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build frontend
        run: npm run build
        env:
          NEXT_PUBLIC_NETWORK: testnet
          NEXT_PUBLIC_INVOICE_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD2KM
          NEXT_PUBLIC_POOL_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD2KM
          NEXT_PUBLIC_USDC_TOKEN_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD2KM

      - name: Configure Playwright base URL
        run: |
          PORT=$(node -e "const net = require('node:net'); const server = net.createServer(); server.listen(0, '127.0.0.1', () => { const { port } = server.address(); server.close(() => console.log(port)); });")
          echo "PLAYWRIGHT_BASE_URL=http://127.0.0.1:${PORT}" >> "$GITHUB_ENV"

      - name: Run Playwright E2E tests
        run: npm run test:e2e
        env:
          NEXT_PUBLIC_NETWORK: testnet
          NEXT_PUBLIC_INVOICE_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD2KM
          NEXT_PUBLIC_POOL_CONTRACT_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD2KM
          NEXT_PUBLIC_USDC_TOKEN_ID: CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAD2KM

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

  # ---- Integration Tests ----
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [rust-contracts, frontend]
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            contracts

      - name: Build all contracts
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Run contract tests
        run: cargo test --workspace --verbose

  # ---- Deploy to Testnet ----
  deploy-testnet:
    name: Deploy to Testnet
    runs-on: ubuntu-latest
    needs: [rust-contracts, frontend, integration-tests]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: testnet
    outputs:
      INVOICE_CONTRACT_ID: ${{ steps.deploy-invoice.outputs.INVOICE_CONTRACT_ID }}
      POOL_CONTRACT_ID: ${{ steps.deploy-pool.outputs.POOL_CONTRACT_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install Stellar CLI
        run: cargo install stellar-cli --locked

      - name: Build contracts
        working-directory: ./contracts
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Configure Stellar CLI
        run: |
          stellar keys add deployer --secret-key "${{ secrets.TESTNET_DEPLOYER_KEY }}"

      - name: Deploy Invoice Contract
        id: deploy-invoice
        run: |
          CONTRACT_ID=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/invoice.wasm \
            --source deployer \
            --network testnet 2>&1 | grep -oP 'Contract ID: \K[A-Z0-9]+' || echo "")
          echo "INVOICE_CONTRACT_ID=$CONTRACT_ID" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Deploy Pool Contract
        id: deploy-pool
        run: |
          CONTRACT_ID=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/pool.wasm \
            --source deployer \
            --network testnet 2>&1 | grep -oP 'Contract ID: \K[A-Z0-9]+' || echo "")
          echo "POOL_CONTRACT_ID=$CONTRACT_ID" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Deploy Credit Score Contract
        id: deploy-credit
        run: |
          CONTRACT_ID=$(stellar contract deploy \
            --wasm target/wasm32-unknown-unknown/release/credit_score.wasm \
            --source deployer \
            --network testnet 2>&1 | grep -oP 'Contract ID: \K[A-Z0-9]+' || echo "")
          echo "CREDIT_CONTRACT_ID=$CONTRACT_ID" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Summary
        run: |
          echo "### Testnet Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Invoice Contract: ${{ steps.deploy-invoice.outputs.INVOICE_CONTRACT_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- Pool Contract: ${{ steps.deploy-pool.outputs.POOL_CONTRACT_ID }}" >> $GITHUB_STEP_SUMMARY
          echo "- Credit Score Contract: ${{ steps.deploy-credit.outputs.CREDIT_CONTRACT_ID }}" >> $GITHUB_STEP_SUMMARY

  # ---- Smoke Tests ----
  smoke-test-testnet:
    name: Testnet Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-testnet]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: testnet
    steps:
      - uses: actions/checkout@v4
      - name: Install Stellar CLI
        run: cargo install stellar-cli --locked
      - name: Configure Stellar CLI
        run: |
          stellar keys add tester --secret-key "${{ secrets.TESTNET_SMOKE_TEST_KEY }}"
      - name: Run Smoke Tests
        timeout-minutes: 2
        env:
          INVOICE_CONTRACT_ID: ${{ needs.deploy-testnet.outputs.INVOICE_CONTRACT_ID }}
          POOL_CONTRACT_ID: ${{ needs.deploy-testnet.outputs.POOL_CONTRACT_ID }}
        run: |
          echo "Test 1: Contract Reachability"
          stellar contract invoke --id $INVOICE_CONTRACT_ID --source-account tester --network testnet -- get_invoice_count
          
          echo "Test 2: Pool Config Readable"
          stellar contract invoke --id $POOL_CONTRACT_ID --source-account tester --network testnet -- get_config
          
          echo "Test 3: End-to-End Mini Lifecycle"
          stellar contract invoke --id $INVOICE_CONTRACT_ID --source-account tester --network testnet -- create_invoice --owner tester --debtor "Smoke Test" --amount 1000 --due_date 1735689600
          # We don't have the returned ID easily but we can check if it didn't fail
          
          echo "Test 4: Contract Version Check"
          stellar contract invoke --id $INVOICE_CONTRACT_ID --network testnet -- version
      
      - name: Post Failure Comment
        if: failure()
        uses: peter-evans/commit-comment@v3
        with:
          body: "⚠️ Testnet deployment smoke tests failed"
      
      - name: Send Webhook Alert
        if: failure()
        run: |
          if [ -n "${{ secrets.ALERT_WEBHOOK_URL }}" ]; then
            curl -X POST -H "Content-Type: application/json" \
              -d '{"text": "⚠️ Testnet deployment smoke tests failed"}' \
              ${{ secrets.ALERT_WEBHOOK_URL }}
          fi

  # ---- Gas / Compute Benchmarks (#442) ----
  gas-benchmarks:
    name: Gas Usage Benchmarks
    runs-on: ubuntu-latest
    needs: [rust-contracts]
    # Non-blocking initially — becomes blocking once baselines are established.
    continue-on-error: true
    env:
      # Budget thresholds are configurable via CI variables so they are never
      # hardcoded in the script itself.
      BUDGET_CREATE_INVOICE_CPU:  ${BUDGET_CREATE_INVOICE_CPU:-500000}
      BUDGET_CREATE_INVOICE_MEM:  ${BUDGET_CREATE_INVOICE_MEM:-100000}
      BUDGET_FUND_INVOICE_CPU:    ${BUDGET_FUND_INVOICE_CPU:-800000}
      BUDGET_FUND_INVOICE_MEM:    ${BUDGET_FUND_INVOICE_MEM:-150000}
      BUDGET_REPAY_INVOICE_CPU:   ${BUDGET_REPAY_INVOICE_CPU:-800000}
      BUDGET_REPAY_INVOICE_MEM:   ${BUDGET_REPAY_INVOICE_MEM:-150000}
      BUDGET_CALC_SCORE_CPU:      ${BUDGET_CALC_SCORE_CPU:-1000000}
      BUDGET_CALC_SCORE_MEM:      ${BUDGET_CALC_SCORE_MEM:-200000}
      BUDGET_DEPOSIT_CPU:         ${BUDGET_DEPOSIT_CPU:-600000}
      BUDGET_DEPOSIT_MEM:         ${BUDGET_DEPOSIT_MEM:-100000}
      BUDGET_WITHDRAW_CPU:        ${BUDGET_WITHDRAW_CPU:-600000}
      BUDGET_WITHDRAW_MEM:        ${BUDGET_WITHDRAW_MEM:-100000}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts

      - name: Build contracts (release)
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run compute-unit benchmarks (simulated)
        id: benchmarks
        run: |
          set -euo pipefail

          # ── helper ────────────────────────────────────────────────────────
          # Simulate a contract invocation and check its compute budget.
          # Because a live network is not available in CI we mock the
          # simulation output so the job structure and threshold checks are
          # fully exercised.  Replace the MOCK_RESULT block with a real
          # `stellar contract invoke --simulate-only` call once baselines
          # are established on testnet.
          check_budget() {
            local fn_name="$1"
            local cpu_budget="$2"
            local mem_budget="$3"

            echo "--- Benchmarking: $fn_name ---"

            # ── MOCK: replace with real stellar CLI call when available ────
            MOCK_RESULT=$(jq -n \
              --argjson cpu 0 \
              --argjson mem 0 \
              '{simulationData:{cost:{cpuInsns:$cpu,memBytes:$mem}}}')
            RESULT="$MOCK_RESULT"
            # ── END MOCK ───────────────────────────────────────────────────

            CPU_UNITS=$(echo "$RESULT" | jq '.simulationData.cost.cpuInsns // 0')
            MEM_BYTES=$(echo "$RESULT"  | jq '.simulationData.cost.memBytes  // 0')

            echo "  CPU: $CPU_UNITS / $cpu_budget"
            echo "  MEM: $MEM_BYTES / $mem_budget"

            FAIL=0
            if [ "$CPU_UNITS" -gt "$cpu_budget" ]; then
              echo "  FAIL: $fn_name CPU $CPU_UNITS exceeds budget $cpu_budget"
              FAIL=1
            fi
            if [ "$MEM_BYTES" -gt "$mem_budget" ]; then
              echo "  FAIL: $fn_name MEM $MEM_BYTES exceeds budget $mem_budget"
              FAIL=1
            fi

            # Emit delta for PR summary
            echo "benchmark_${fn_name}_cpu=${CPU_UNITS}" >> "$GITHUB_OUTPUT"
            echo "benchmark_${fn_name}_mem=${MEM_BYTES}" >> "$GITHUB_OUTPUT"

            return $FAIL
          }

          OVERALL=0
          check_budget "create_invoice" "$BUDGET_CREATE_INVOICE_CPU" "$BUDGET_CREATE_INVOICE_MEM" || OVERALL=1
          check_budget "fund_invoice"   "$BUDGET_FUND_INVOICE_CPU"   "$BUDGET_FUND_INVOICE_MEM"   || OVERALL=1
          check_budget "repay_invoice"  "$BUDGET_REPAY_INVOICE_CPU"  "$BUDGET_REPAY_INVOICE_MEM"  || OVERALL=1
          check_budget "calculate_score" "$BUDGET_CALC_SCORE_CPU"    "$BUDGET_CALC_SCORE_MEM"     || OVERALL=1
          check_budget "deposit"        "$BUDGET_DEPOSIT_CPU"        "$BUDGET_DEPOSIT_MEM"        || OVERALL=1
          check_budget "withdraw"       "$BUDGET_WITHDRAW_CPU"       "$BUDGET_WITHDRAW_MEM"       || OVERALL=1

          exit $OVERALL

      - name: Post benchmark summary
        if: always()
        run: |
          echo "### Gas Benchmark Results" >> "$GITHUB_STEP_SUMMARY"
          echo "| Function | CPU (units) | CPU Budget | MEM (bytes) | MEM Budget |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| create_invoice  | ${{ steps.benchmarks.outputs.benchmark_create_invoice_cpu }}  | $BUDGET_CREATE_INVOICE_CPU  | ${{ steps.benchmarks.outputs.benchmark_create_invoice_mem }}  | $BUDGET_CREATE_INVOICE_MEM  |" >> "$GITHUB_STEP_SUMMARY"
          echo "| fund_invoice    | ${{ steps.benchmarks.outputs.benchmark_fund_invoice_cpu }}    | $BUDGET_FUND_INVOICE_CPU    | ${{ steps.benchmarks.outputs.benchmark_fund_invoice_mem }}    | $BUDGET_FUND_INVOICE_MEM    |" >> "$GITHUB_STEP_SUMMARY"
          echo "| repay_invoice   | ${{ steps.benchmarks.outputs.benchmark_repay_invoice_cpu }}   | $BUDGET_REPAY_INVOICE_CPU   | ${{ steps.benchmarks.outputs.benchmark_repay_invoice_mem }}   | $BUDGET_REPAY_INVOICE_MEM   |" >> "$GITHUB_STEP_SUMMARY"
          echo "| calculate_score | ${{ steps.benchmarks.outputs.benchmark_calculate_score_cpu }} | $BUDGET_CALC_SCORE_CPU      | ${{ steps.benchmarks.outputs.benchmark_calculate_score_mem }} | $BUDGET_CALC_SCORE_MEM      |" >> "$GITHUB_STEP_SUMMARY"
          echo "| deposit         | ${{ steps.benchmarks.outputs.benchmark_deposit_cpu }}         | $BUDGET_DEPOSIT_CPU         | ${{ steps.benchmarks.outputs.benchmark_deposit_mem }}         | $BUDGET_DEPOSIT_MEM         |" >> "$GITHUB_STEP_SUMMARY"
          echo "| withdraw        | ${{ steps.benchmarks.outputs.benchmark_withdraw_cpu }}        | $BUDGET_WITHDRAW_CPU        | ${{ steps.benchmarks.outputs.benchmark_withdraw_mem }}        | $BUDGET_WITHDRAW_MEM        |" >> "$GITHUB_STEP_SUMMARY"

